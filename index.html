
          <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikanta's Profiles</title>
    <style>
        /* Winter-themed moving background */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            background: linear-gradient(to bottom, #74ebd5, #acb6e5);
        }

        /* Ensure canvas is behind all content */
        canvas.snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .content {
            z-index: 2;
            text-align: center;
            color: white;
            position: relative;
        }

        h1 {
            font-size: 3em;
            margin-top: 50px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        /* Profile buttons with platform-specific styling */
        .button {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            color: white;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .leetcode { background-color: #f89f1b; }
        .gfg { background-color: #308d46; }
        .codechef { background-color: #684273; }
        .atcoder { background-color: #007acb; }
        .topcoder { background-color: #29a7e1; }
        .hackerrank { background-color: #2ea94c; }
    </style>
</head>
<body>
    <canvas class="snow"></canvas>
    <div class="content">
        <h1>Hi, I am Manikanta</h1>
        <p>You can find my profiles here:</p>
        <a href="https://leetcode.com/u/orugantimanikan1/" class="button leetcode" target="_blank">LeetCode</a>
        <a href="https://www.geeksforgeeks.org/user/orugantimanikanta/" class="button gfg" target="_blank">GeeksforGeeks</a>
        <a href="https://www.codechef.com/users/mani24022005" class="button codechef" target="_blank">CodeChef</a>
        <a href="https://atcoder.jp/users/manikanta_01" class="button atcoder" target="_blank">AtCoder</a>
        <a href="https://profiles.topcoder.com/manikanta_1" class="button topcoder" target="_blank">TopCoder</a>
        <a href="https://www.hackerrank.com/profile/orugantimanikan1" class="button hackerrank" target="_blank">HackerRank</a>
    </div>

    <script>
        // Snow Effect
        const canvas = document.querySelector('.snow');
        const ctx = canvas.getContext('2d');
        const snowflakes = Array(200).fill().map(() => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            r: Math.random() * 4 + 1,
            d: Math.random(),
        }));

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawSnowflakes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            snowflakes.forEach(flake => {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
                ctx.fill();
            });
            moveSnowflakes();
        }

        function moveSnowflakes() {
            snowflakes.forEach(flake => {
                flake.y += flake.d;
                if (flake.y > window.innerHeight) flake.y = 0;
            });
        }
        setInterval(drawSnowflakes, 33);
    </script>
</body>
</html>
