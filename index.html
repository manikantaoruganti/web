<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikanta's Profiles</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, #00c6ff, #0072ff);
            animation: backgroundMove 6s infinite alternate;
            z-index: -1;
        }

        @keyframes backgroundMove {
            0% { background-position: 0 0; }
            100% { background-position: 200% 200%; }
        }

        .content {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 10%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        }

        .leetcode { background: #f89f1b; }
        .hackerrank { background: #1ba94c; }
        .gfg { background: #2f9e44; }
        .atcoder { background: #003a8c; }
        .codechef { background: #68217a; }
        .codeforces { background: #1f8dd6; }
        .topcoder { background: #29a19c; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="content">
        <h1>I am Manikanta</h1>
        <p>You can visit my profiles here:</p>
        <div class="buttons">
            <a href="https://leetcode.com/orugantimanikan1" target="_blank" class="btn leetcode">Leetcode</a>
            <a href="https://www.hackerrank.com/orugantimanikan1" target="_blank" class="btn hackerrank">Hackerrank</a>
            <a href="https://auth.geeksforgeeks.org/user/orugantimanikanta" target="_blank" class="btn gfg">GeeksforGeeks</a>
            <a href="https://atcoder.jp/users/manikanta_01" target="_blank" class="btn atcoder">Atcoder</a>
            <a href="https://www.codechef.com/users/mani24022005" target="_blank" class="btn codechef">Codechef</a>
            <a href="https://codeforces.com/profile/orugantimanikanta" target="_blank" class="btn codeforces">Codeforces</a>
            <a href="https://www.topcoder.com/members/manikanta_1" target="_blank" class="btn topcoder">Topcoder</a>
        </div>
    </div>
</body>
</html>
