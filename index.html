<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikanta's Profiles</title>
    <style>
        /* Reset and General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(120deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientMove 10s infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4);
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        /* Buttons with unique colors */
        .leetcode { background: #f89f1b; }
        .hackerrank { background: #1ba94c; }
        .gfg { background: #2f9e44; }
        .atcoder { background: #003a8c; }
        .codechef { background: #68217a; }
        .codeforces { background: #1f8dd6; }
        .topcoder { background: #29a19c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>I am Manikanta</h1>
        <p>You can visit my profiles here:</p>
        <div class="buttons">
            <a href="https://leetcode.com/orugantimanikan1" target="_blank" class="btn leetcode">Leetcode</a>
            <a href="https://www.hackerrank.com/orugantimanikan1" target="_blank" class="btn hackerrank">Hackerrank</a>
            <a href="https://auth.geeksforgeeks.org/user/orugantimanikanta" target="_blank" class="btn gfg">GeeksforGeeks</a>
            <a href="https://atcoder.jp/users/manikanta_01" target="_blank" class="btn atcoder">Atcoder</a>
            <a href="https://www.codechef.com/users/mani24022005" target="_blank" class="btn codechef">Codechef</a>
            <a href="https://codeforces.com/profile/orugantimanikanta" target="_blank" class="btn codeforces">Codeforces</a>
            <a href="https://www.topcoder.com/members/manikanta_1" target="_blank" class="btn topcoder">Topcoder</a>
        </div>
    </div>
</body>
</html>
