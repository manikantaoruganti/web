      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikanta's Profiles</title>
    <style>
        /* Winter-themed moving background */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #74ebd5, #acb6e5);
        }

        canvas.snow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            z-index: 2;
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        /* Profile buttons with platform-specific styling */
        .button {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            color: white;
            transition: transform 0.3s ease;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .leetcode { background-color: #f89f1b; }
        .gfg { background-color: #308d46; }
        .codechef { background-color: #684273; }
        .atcoder { background-color: #007acb; }
        .topcoder { background-color: #29a7e1; }
        .hackerrank { background-color: #2ea94c; }

        /* Horizontal Slides */
        .slides {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s ease-in-out;
        }

        .slides.active {
            display: block;
        }

        .slide-content {
            width: 80%;
            text-align: center;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
        }

        .slide {
            flex: 0 0 100%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slide h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .slide p {
            font-size: 1.5em;
        }

        .slide a {
            color: #f89f1b;
            text-decoration: none;
            font-size: 1.2em;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5em;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas class="snow"></canvas>
    <div class="content">
        <h1>Hi, I am Manikanta</h1>
        <p>You can find my profiles here:</p>
        <button class="button leetcode" onclick="showSlides('LeetCode')">LeetCode</button>
        <button class="button gfg" onclick="showSlides('GeeksforGeeks')">GeeksforGeeks</button>
        <button class="button codechef" onclick="showSlides('CodeChef')">CodeChef</button>
        <button class="button atcoder" onclick="showSlides('AtCoder')">AtCoder</button>
        <button class="button topcoder" onclick="showSlides('TopCoder')">TopCoder</button>
        <button class="button hackerrank" onclick="showSlides('HackerRank')">HackerRank</button>
    </div>

    <div class="slides" id="slides">
        <span class="close" onclick="hideSlides()">×</span>
        <div class="slide-content" id="slideContent">
            <!-- Dynamic Slides Content Here -->
        </div>
    </div>

    <script>
        const profiles = {
            LeetCode: [
                { title: "Profile", content: `<a href="https://leetcode.com/u/orugantimanikan1/" target="_blank">Visit LeetCode</a>` },
                { title: "Problems Solved", content: "150 Problems Solved" },
                { title: "Badges", content: "5 Achievements Earned" },
            ],
            GeeksforGeeks: [
                { title: "Profile", content: `<a href="https://www.geeksforgeeks.org/user/orugantimanikanta/" target="_blank">Visit GFG</a>` },
                { title: "Articles", content: "10 Published Articles" },
                { title: "Problems Solved", content: "120 Questions Solved" },
            ],
            CodeChef: [
                { title: "Profile", content: `<a href="https://www.codechef.com/users/mani24022005" target="_blank">Visit CodeChef</a>` },
                { title: "Rating", content: "1800" },
                { title: "Problems Solved", content: "200" },
            ],
        };

        function showSlides(profile) {
            const slideContent = document.getElementById('slideContent');
            slideContent.innerHTML = '';

            profiles[profile].forEach(slide => {
                const slideElement = document.createElement('div');
                slideElement.classList.add('slide');
                slideElement.innerHTML = `<h2>${slide.title}</h2><p>${slide.content}</p>`;
                slideContent.appendChild(slideElement);
            });

            document.getElementById('slides').classList.add('active');
        }

        function hideSlides() {
            document.getElementById('slides').classList.remove('active');
        }

        // Snow Effect
        const canvas = document.querySelector('.snow');
        const ctx = canvas.getContext('2d');
        const snowflakes = Array(200).fill().map(() => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            r: Math.random() * 4 + 1,
            d: Math.random(),
        }));

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawSnowflakes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            snowflakes.forEach(flake => {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
                ctx.fill();
            });
            moveSnowflakes();
        }

        function moveSnowflakes() {
            snowflakes.forEach(flake => {
                flake.y += flake.d;
                if (flake.y > window.innerHeight) flake.y = 0;
            });
        }
        setInterval(drawSnowflakes, 33);
    </script>
</body>
</html>
