<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikanta's Profile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to top, #1f3c5b, #6c8dc5);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 3em;
            text-align: center;
            margin-top: 20%;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.6);
        }

        .intro-text {
            font-size: 1.5em;
            text-align: center;
            margin-top: 10px;
        }

        .profiles-container {
            text-align: center;
            margin-top: 30px;
        }

        .button {
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
            border: none;
            color: white;
            padding: 16px 30px;
            text-align: center;
            font-size: 18px;
            margin: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }

        .profiles-container a {
            color: white;
            text-decoration: none;
            display: inline-block;
            margin: 10px 15px;
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .profiles-container a:hover {
            color: #ff4b2b;
            text-decoration: underline;
        }

        .snow {
            position: absolute;
            top: -10px;
            color: #fff;
            font-size: 2em;
            user-select: none;
            animation: fall 4s linear infinite;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello, I'm Manikanta!</h1>
        <p class="intro-text">You can visit my profiles here:</p>

        <div class="profiles-container">
            <button class="button" onclick="window.location.href='https://profiles.topcoder.com/manikanta_1'">Topcoder</button>
            <button class="button" onclick="window.location.href='https://atcoder.jp/users/manikanta_01'">Atcoder</button>
            <button class="button" onclick="window.location.href='https://www.geeksforgeeks.org/user/orugantimanikanta/'">GeeksforGeeks</button>
            <button class="button" onclick="window.location.href='https://leetcode.com/u/orugantimanikan1/'">Leetcode</button>
            <button class="button" onclick="window.location.href='https://www.hackerrank.com/profile/orugantimanikan1'">Hackerrank</button>
            <button class="button" onclick="window.location.href='https://codeforces.com/profile/orugantimanikanta'">Codeforces</button>
            <button class="button" onclick="window.location.href='https://www.codechef.com/users/mani24022005'">Codechef</button>
        </div>
    </div>

    <script>
        // Create snowdrop animation effect
        function createSnowdrops() {
            const numSnowdrops = 70; // Number of snowdrops
            for (let i = 0; i < numSnowdrops; i++) {
                const snowdrop = document.createElement('div');
                snowdrop.classList.add('snow');
                snowdrop.style.left = `${Math.random() * 100}vw`; // Random horizontal position
                snowdrop.style.animationDuration = `${Math.random() * 5 + 5}s`; // Random duration
                snowdrop.style.animationDelay = `${Math.random() * 3}s`; // Random delay
                snowdrop.innerHTML = '❄'; // Snowdrop character
                document.body.appendChild(snowdrop);
            }
        }

        createSnowdrops();
    </script>

</body>
</html>
