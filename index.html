      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manikanta's Journey</title>
    <style>
        /* Winter-themed moving background */
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #74ebd5, #acb6e5);
        }

        canvas.snow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            z-index: 2;
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        /* Profile buttons with platform-specific styling */
        .button {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            color: white;
            transition: transform 0.3s ease;
            text-align: center;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .leetcode {
            background-color: #f89f1b;
        }

        .gfg {
            background-color: #308d46;
        }

        .codechef {
            background-color: #684273;
        }

        .atcoder {
            background-color: #007acb;
        }

        .topcoder {
            background-color: #29a7e1;
        }

        .hackerrank {
            background-color: #2ea94c;
        }

        /* Horizontal Slides */
        .slides {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s ease-in-out;
        }

        .slides.active {
            display: block;
        }

        .slide-content {
            width: 80%;
            text-align: center;
        }

        .slide {
            width: 100%;
            flex-shrink: 0;
            text-align: center;
            opacity: 0;
            transform: translateX(100%);
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
        }

        .slide.active {
            transform: translateX(0%);
            opacity: 1;
        }

        .slide h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .slide p {
            font-size: 1.5em;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5em;
            color: white;
            cursor: pointer;
        }

        .next, .prev {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            color: white;
            cursor: pointer;
            z-index: 4;
            user-select: none;
        }

        .next {
            right: 20px;
        }

        .prev {
            left: 20px;
        }
    </style>
</head>
<body>
    <canvas class="snow"></canvas>
    <div class="content">
        <h1>Hi, I am Manikanta</h1>
        <p>You can find my profiles here:</p>
        <button class="button leetcode" onclick="showSlides('LeetCode')">LeetCode</button>
        <button class="button gfg" onclick="showSlides('GeeksforGeeks')">GeeksforGeeks</button>
        <button class="button codechef" onclick="showSlides('CodeChef')">CodeChef</button>
        <button class="button atcoder" onclick="showSlides('AtCoder')">AtCoder</button>
        <button class="button topcoder" onclick="showSlides('TopCoder')">TopCoder</button>
        <button class="button hackerrank" onclick="showSlides('HackerRank')">HackerRank</button>
    </div>

    <div class="slides" id="slides">
        <span class="close" onclick="hideSlides()">×</span>
        <span class="prev" onclick="prevSlide()">❮</span>
        <span class="next" onclick="nextSlide()">❯</span>
        <div class="slide-content">
            <div class="slide" id="slide1">
                <h2 id="slideTitle1">Slide 1</h2>
                <p id="slideContent1"></p>
            </div>
            <div class="slide" id="slide2">
                <h2 id="slideTitle2">Slide 2</h2>
                <p id="slideContent2"></p>
            </div>
            <div class="slide" id="slide3">
                <h2 id="slideTitle3">Slide 3</h2>
                <p id="slideContent3"></p>
            </div>
        </div>
    </div>

    <script>
        // Snow effect
        const snowCanvas = document.querySelector('.snow');
        const ctx = snowCanvas.getContext('2d');
        let particles = [];

        function resize() {
            snowCanvas.width = window.innerWidth;
            snowCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function createSnowflakes() {
            particles = Array.from({ length: 200 }, () => ({
                x: Math.random() * snowCanvas.width,
                y: Math.random() * snowCanvas.height,
                r: Math.random() * 3 + 1,
                d: Math.random() * 1
            }));
        }
        createSnowflakes();

        function drawSnowflakes() {
            ctx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            particles.forEach(p => {
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
            });
            ctx.fill();
            moveSnowflakes();
        }

        function moveSnowflakes() {
            particles.forEach(p => {
                p.y += p.d;
                if (p.y > snowCanvas.height) {
                    p.y = 0;
                    p.x = Math.random() * snowCanvas.width;
                }
            });
        }
        setInterval(drawSnowflakes, 33);

        // Slide functionality
        let currentSlide = 0;

        const slideData = {
            LeetCode: [
                { title: "Problems Solved", content: "150 Problems" },
                { title: "Rating", content: "2000" },
                { title: "Badges", content: "5 Badges" },
            ],
            GeeksforGeeks: [
                { title: "Articles", content: "10 Published Articles" },
                { title: "Challenges", content: "15 Challenges Completed" },
                { title: "Problems", content: "100 Problems Solved" },
            ],
            CodeChef: [
                { title: "Rating", content: "1800" },
                { title: "Problems Solved", content: "200" },
                { title: "Contests", content: "15 Contests Participated" },
            ],
        };

        function showSlides(profileId) {
            const slides = document.getElementById('slides');
            slides.classList.add('active');

            const slidesData = slideData[profileId];
            slidesData.forEach((slide, index) => {
                document.getElementById(`slideTitle${index + 1}`).textContent = slide.title;
                document.getElementById(`slideContent${index + 1}`).textContent = slide.content;
            });

            currentSlide = 0;
            updateSlide();
        }

        function hideSlides() {
            document.getElementById('slides').classList.remove('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % 3;
            updateSlide();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + 3) % 3;
            updateSlide();
        }

        function updateSlide() {
            Array.from(document.querySelectorAll('.slide')).forEach((slide, index) => {
                slide.classList.remove('active');
                if (index === currentSlide) {
                    slide.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
